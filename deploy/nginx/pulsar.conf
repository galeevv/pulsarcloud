limit_req_zone $binary_remote_addr zone=pulsar_webhook:10m rate=20r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name pulsar-cloud.space panel.pulsar-cloud.space sub.pulsar-cloud.space;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pulsar-cloud.space;
    ssl_certificate /etc/letsencrypt/live/pulsar-cloud.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsar-cloud.space/privkey.pem;
    client_max_body_size 512k;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    location = /api/auth/telegram/complete {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    location ~ ^/api/integrations/ {
        limit_req zone=pulsar_webhook burst=40 nodelay;
        proxy_read_timeout 30s;
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        include proxy_params;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.pulsar-cloud.space;
    ssl_certificate /etc/letsencrypt/live/pulsar-cloud.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsar-cloud.space/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        include proxy_params;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sub.pulsar-cloud.space;
    ssl_certificate /etc/letsencrypt/live/pulsar-cloud.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsar-cloud.space/privkey.pem;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # The subscription UI is addressable only by /<shortUuid>. Avoid exposing
    # an upstream connection reset as a misleading 502 on the bare hostname.
    location = / {
        return 302 https://pulsar-cloud.space/;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        include proxy_params;
    }
}
