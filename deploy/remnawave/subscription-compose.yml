services:
  remnawave-subscription-page:
    image: remnawave/subscription-page:latest
    container_name: remnawave-subscription-page
    hostname: remnawave-subscription-page
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:3010:3010"
    networks:
      - remnawave-network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  remnawave-network:
    external: true

