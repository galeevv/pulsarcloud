services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsar2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulsar2
      POSTGRES_USER: pulsar
      POSTGRES_PASSWORD: pulsar
    ports:
      - "5433:5432"
    volumes:
      - pulsar2-postgres-data:/var/lib/postgresql/data

volumes:
  pulsar2-postgres-data:
